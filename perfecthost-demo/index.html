<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Perfect Host</title>
  <meta name="theme-color" content="#0e6860" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Perfect Host" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    :root {
      --ink: #17211f;
      --muted: #65706c;
      --panel: rgba(255, 250, 242, 0.94);
      --line: rgba(38, 31, 23, 0.15);
      --brand: #0e6860;
      --red: #c64141;
      --shadow: 0 16px 40px rgba(28, 22, 16, 0.18);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #041019;
      color: var(--ink);
      font-family: Inter, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
      user-select: none;
    }

    button, input, textarea { font: inherit; }
    button { cursor: pointer; }

    .app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(4, 12, 18, 0.88) 0 42px, transparent 42px),
        radial-gradient(circle at 50% 0%, rgba(24, 96, 123, 0.18), transparent 34%),
        linear-gradient(180deg, #05121b 0%, #071823 100%);
    }

    .map-viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      background: #071823;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .map-viewport::-webkit-scrollbar { display: none; }

    .map-scale {
      width: calc(var(--floor-w, 1500px) * var(--zoom, 1));
      height: calc(var(--floor-h, 900px) * var(--zoom, 1));
      position: relative;
      transform-origin: 0 0;
      margin: var(--map-y, 0px) var(--map-x, 0px);
    }

    .floor {
      position: absolute;
      inset: 0 auto auto 0;
      width: 1665px;
      height: 945px;
      transform: scale(var(--zoom, 1));
      transform-origin: 0 0;
      border: 0;
      border-radius: 14px;
      overflow: hidden;
      background:
        url("./emptymap5.png") center / 100% 100% no-repeat,
        #2f1b11;
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.04),
        0 24px 70px rgba(0, 0, 0, 0.48);
    }

    .floor::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(6, 14, 18, 0.24), transparent 18%, transparent 72%, rgba(8, 10, 10, 0.28)),
        radial-gradient(circle at 4% 26%, rgba(246, 182, 92, 0.16), transparent 9%),
        radial-gradient(circle at 96% 34%, rgba(246, 182, 92, 0.15), transparent 9%);
      z-index: 2;
      display: none;
    }

    .room, .bar, .label, .sofa, .window, .deck {
      position: absolute;
      z-index: 1;
    }

    .fixture {
      display: none;
    }

    .room {
      display: grid;
      place-items: center;
      border: 6px solid #1e2428;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 18px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 18px),
        #1b2226;
      color: rgba(255, 250, 242, 0.82);
      font-size: 0.72rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.52);
    }

    .fixture.wall {
      background: #607071;
      border-color: #607071;
    }

    .fixture.door {
      background: #24292c;
      border-color: #607071;
      border-right-color: #c44135;
    }

    .edit-mode .fixture {
      outline: 2px dashed rgba(14, 104, 96, 0.38);
      outline-offset: 3px;
    }

    .prep {
      background: #1c2226;
    }

    .storage {
      background: #1c2226;
    }

    .bar {
      border: 5px solid #151a1d;
      background:
        radial-gradient(circle at 20% 78%, rgba(245, 201, 130, 0.16), transparent 13%),
        linear-gradient(120deg, rgba(205, 128, 55, 0.22) 0 1px, transparent 1px 16px),
        linear-gradient(155deg, transparent 0 54%, rgba(198, 122, 57, 0.22) 54% 55%, transparent 55%),
        linear-gradient(180deg, #171a1b 0%, #25211d 48%, #0c1011 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.08),
        inset 0 -16px 28px rgba(0,0,0,0.36),
        0 16px 30px rgba(0, 0, 0, 0.38);
    }

    .bar::after {
      content: "";
      position: absolute;
      left: 56px;
      right: 50px;
      bottom: 9px;
      height: 15px;
      background:
        linear-gradient(180deg, rgba(252, 183, 80, 0.18), transparent),
        repeating-linear-gradient(90deg, rgba(217, 130, 42, 0.96) 0 8px, rgba(54, 34, 18, 0.96) 8px 15px);
      box-shadow: 0 -20px 0 rgba(0, 0, 0, 0.2), 0 -1px 0 rgba(255,255,255,0.06);
    }

    .bar::before {
      content: "";
      position: absolute;
      left: 94px;
      top: -26px;
      width: 24px;
      height: 22px;
      border-radius: 7px;
      background: linear-gradient(180deg, #2a231d, #12100f);
      box-shadow:
        62px 0 0 #211b16,
        124px 0 0 #211b16,
        186px 0 0 #211b16,
        248px 0 0 #211b16,
        310px 0 0 #211b16;
      border: 2px solid #946537;
    }

    .label {
      color: rgba(255, 250, 242, 0.78);
      font-size: 1.16rem;
      font-weight: 950;
      letter-spacing: 0.44em;
    }

    .sofa {
      display: block;
      border: 4px solid #06233a;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.16), transparent 30%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 38px),
        linear-gradient(90deg, #10547d, #073257);
      box-shadow: inset 0 -10px 0 rgba(0,0,0,0.22), inset 0 0 0 2px rgba(95,153,187,0.22), 0 10px 18px rgba(0,0,0,0.3);
    }

    .sofa::after {
      content: attr(data-label);
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 900;
      text-shadow: 0 2px 6px rgba(0,0,0,0.55);
    }

    .window {
      left: 0;
      right: 0;
      bottom: 96px;
      height: 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.22), transparent),
        repeating-linear-gradient(100deg, rgba(235, 250, 255, 0.72) 0 38px, rgba(31, 43, 48, 0.9) 38px 45px);
      border-top: 5px solid #20272b;
      border-bottom: 5px solid #20272b;
      box-shadow: 0 10px 16px rgba(0,0,0,0.3);
    }

    .deck {
      left: -10px;
      right: -10px;
      bottom: -10px;
      height: 106px;
      background:
        repeating-linear-gradient(90deg, rgba(45, 23, 12, 0.42) 0 2px, transparent 2px 68px),
        repeating-linear-gradient(0deg, rgba(255, 225, 175, 0.08) 0 1px, transparent 1px 18px),
        linear-gradient(180deg, #a06b3f, #794829 70%, #5f351f);
      border-top: 6px solid #151b1d;
    }

    .sea {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 118px;
      z-index: 1;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 18% 14%, rgba(255,255,255,0.38), transparent 8%),
        radial-gradient(ellipse at 56% 20%, rgba(255,255,255,0.32), transparent 9%),
        repeating-linear-gradient(176deg, rgba(255,255,255,0.18) 0 2px, transparent 2px 28px),
        linear-gradient(180deg, #0b4b68 0%, #1f718e 48%, #d6c6a6 49%, #9c8770 72%, #7a593d 100%);
      border-bottom: 6px solid #151b1d;
    }

    .sea::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 22px;
      height: 26px;
      background:
        radial-gradient(circle at 4px 12px, #b6b1a9 0 4px, transparent 5px) 0 0 / 28px 18px,
        radial-gradient(circle at 15px 5px, #7e7c78 0 3px, transparent 4px) 0 0 / 24px 17px,
        linear-gradient(180deg, #d8cab0, #9f8c76);
      box-shadow: 0 -7px 14px rgba(255,255,255,0.18);
    }

    .sea::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 12px;
      height: 34px;
      background:
        repeating-linear-gradient(172deg, rgba(255,255,255,0.34) 0 3px, transparent 3px 52px),
        linear-gradient(180deg, transparent, rgba(255,255,255,0.12));
    }

    .table {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--ink);
      z-index: 4;
    }

    .piece {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      transition: transform 140ms ease, filter 140ms ease;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.22));
    }

    .table:active .piece {
      transform: scale(0.96);
    }

    .chair {
      position: absolute;
      width: 30%;
      height: 21%;
      border-radius: 6px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.32), transparent 34%),
        linear-gradient(90deg, #d7b078, #f0d29d 52%, #bd8951);
      border: 2px solid rgba(75, 42, 19, 0.36);
      box-shadow: inset 0 -4px 0 rgba(73,41,18,0.16), 0 3px 5px rgba(0,0,0,0.22);
      z-index: 1;
    }

    .chair.side-left { left: -8%; top: var(--cy); transform: translateY(-50%) rotate(90deg); }
    .chair.side-right { right: -8%; top: var(--cy); transform: translateY(-50%) rotate(90deg); }
    .chair.long-top { top: -7%; left: var(--cx); transform: translateX(-50%); }
    .chair.long-bottom { bottom: -7%; left: var(--cx); transform: translateX(-50%); }
    .chair.radial {
      left: 50%;
      top: 50%;
      width: 22%;
      height: 16%;
      transform: rotate(var(--a)) translateY(-178%) translateX(-50%);
      transform-origin: center;
    }

    .shape {
      width: 76%;
      height: 76%;
      border: 4px solid color-mix(in srgb, var(--status) 38%, #b47b35);
      border-radius: 7px;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.18), transparent 22%),
        linear-gradient(135deg, rgba(255,255,255,0.2), transparent 42%),
        linear-gradient(180deg, color-mix(in srgb, var(--status) 60%, #06351f), color-mix(in srgb, var(--status) 32%, #052012));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -8px 12px rgba(0,0,0,0.22), 0 10px 18px rgba(0, 0, 0, 0.28);
      display: grid;
      place-items: center;
      z-index: 2;
    }

    .table.rectangle .shape,
    .table.square .shape,
    .table.unit .shape {
      border-radius: 5px;
    }

    .table.joined .shape::before {
      content: "";
      position: absolute;
      inset: 10px auto 10px 50%;
      width: 2px;
      background: rgba(255, 250, 242, 0.55);
      transform: translateX(-50%);
      z-index: 1;
    }

    .round .shape,
    .high .shape { border-radius: 50%; width: 72%; height: 72%; }
    .sofa-table .shape {
      width: 100%;
      height: 100%;
      border-radius: 10px;
      border-color: color-mix(in srgb, var(--status) 38%, #b47b35);
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,0.18), transparent 22%),
        linear-gradient(135deg, rgba(255,255,255,0.2), transparent 42%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.045) 0 1px, transparent 1px 34px),
        linear-gradient(180deg, color-mix(in srgb, var(--status) 60%, #06351f), color-mix(in srgb, var(--status) 32%, #052012));
      box-shadow: inset 0 -10px 0 rgba(0,0,0,0.2), inset 0 0 0 2px rgba(93,157,196,0.18), 0 10px 18px rgba(0,0,0,0.3);
    }
    .banquette .shape { width: 54%; height: 72%; }

    .shape::after {
      content: "";
      width: 38%;
      height: 38%;
      border-radius: 50%;
      background: #f7f3ea;
      border: 2px solid rgba(46, 56, 53, 0.18);
      box-shadow: inset 0 0 0 6px rgba(255,255,255,0.7);
      display: none;
    }

    .sofa-table .shape::after { display: none; }

    .badge {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      min-width: 46px;
      border-radius: 999px;
      background: transparent;
      border: 0;
      box-shadow: none;
      color: #fffaf2;
      padding: 4px 5px;
      z-index: 4;
      font-size: 1.04rem;
      line-height: 1.02;
      font-weight: 950;
      pointer-events: none;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.5), 0 0 10px rgba(0, 0, 0, 0.92);
    }

    .badge small {
      display: block;
      margin-top: 2px;
      color: rgba(255, 250, 242, 0.78);
      font-size: 0.56rem;
      font-weight: 950;
    }

    .flag {
      position: absolute;
      left: 50%;
      top: calc(100% - 2px);
      transform: translateX(-50%);
      max-width: 100px;
      min-width: 58px;
      border-radius: 999px;
      padding: 4px 6px;
      background: rgba(255, 250, 242, 0.96);
      border: 1px solid color-mix(in srgb, var(--status) 34%, transparent);
      color: color-mix(in srgb, var(--status) 75%, #17211f);
      box-shadow: 0 5px 12px rgba(31, 24, 17, 0.12);
      font-size: 0.56rem;
      line-height: 1.05;
      font-weight: 950;
      z-index: 5;
      pointer-events: none;
      display: none;
    }

    .alert .shape {
      animation: alertPulse 1.55s infinite;
    }

    .alert .flag { display: block; color: var(--red); }

    .selected .shape {
      box-shadow: 0 0 0 8px rgba(14, 104, 96, 0.22), 0 14px 22px rgba(53, 36, 18, 0.28);
    }

    .edit-mode .table .piece {
      filter: saturate(1.08) drop-shadow(0 6px 14px rgba(14, 104, 96, 0.2));
    }

    .edit-mode .table.selected .shape {
      box-shadow: 0 0 0 10px rgba(14, 104, 96, 0.28), 0 14px 22px rgba(53, 36, 18, 0.28);
    }

    @keyframes alertPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(198, 65, 65, 0.14), 0 10px 18px rgba(53, 36, 18, 0.24); }
      50% { box-shadow: 0 0 0 9px rgba(198, 65, 65, 0.22), 0 16px 22px rgba(53, 36, 18, 0.3); }
    }

    .hud {
      position: absolute;
      z-index: 20;
      left: max(8px, env(safe-area-inset-left));
      top: max(8px, env(safe-area-inset-top));
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .mark, .icon {
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.26);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    .mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #0f766d, #083f3d);
      color: #fff8df;
      font-weight: 950;
      font-size: 0.8rem;
    }

    .icon {
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      background: rgba(5, 14, 20, 0.86);
      color: #f5c982;
      font-weight: 950;
      border-color: rgba(38, 31, 23, 0.12);
    }

    .icon.active {
      background: #0e6860;
      color: #fff8df;
      border-color: rgba(245, 201, 130, 0.34);
    }

    .zoom {
      position: absolute;
      z-index: 20;
      right: max(8px, env(safe-area-inset-right));
      top: max(8px, env(safe-area-inset-top));
      display: flex;
      gap: 6px;
    }

    .key {
      position: absolute;
      z-index: 20;
      left: max(8px, env(safe-area-inset-left));
      bottom: max(8px, env(safe-area-inset-bottom));
      display: flex;
      gap: 6px;
      padding: 6px;
      border-radius: var(--radius);
      background: rgba(5, 14, 20, 0.86);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: var(--shadow);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }

    .key span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #f7efe2;
      font-size: 0.58rem;
      font-weight: 950;
      white-space: nowrap;
    }

    .key i {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--c);
      border: 2px solid rgba(255,255,255,0.74);
      box-shadow: 0 2px 6px rgba(31, 24, 17, 0.2);
    }

    .editor {
      position: absolute;
      z-index: 30;
      right: max(8px, env(safe-area-inset-right));
      bottom: max(8px, env(safe-area-inset-bottom));
      width: min(420px, calc(100vw - 16px));
      max-height: calc(100dvh - 72px);
      display: none;
      grid-template-rows: 42px 42px minmax(0, 1fr) 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
    }

    .editor.open { display: grid; }

    .editor-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 6px;
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
    }

    .editor-head h2 {
      margin: 0;
      font-size: 1rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pill {
      height: 24px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0 8px;
      background: color-mix(in srgb, var(--status) 16%, white);
      color: color-mix(in srgb, var(--status) 76%, #17211f);
      font-size: 0.66rem;
      font-weight: 950;
    }

    .close {
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 950;
    }

    .quick {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
    }

    .guest-stepper {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) 30px;
      gap: 5px;
      align-items: center;
    }

    .guest-stepper button {
      height: 30px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      font-weight: 950;
    }

    .guest-count {
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: #fff;
      border: 1px solid var(--line);
      font-size: 1rem;
      font-weight: 950;
    }

    input, textarea {
      width: 100%;
      min-width: 0;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 6px 7px;
      outline: none;
      font-size: 0.78rem;
      font-weight: 850;
    }

    textarea {
      resize: none;
      user-select: text;
    }

    .elapsed {
      display: grid;
      place-items: center;
      height: 30px;
      border-radius: var(--radius);
      background: #efe7db;
      text-align: center;
      font-size: 0.62rem;
      line-height: 1.05;
      font-weight: 950;
    }

    .steps {
      min-height: 0;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 5px;
      overflow: hidden;
    }

    .step {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffaf4;
      padding: 5px;
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 5px;
      text-align: left;
      align-content: start;
    }

    .step.done {
      background: #eef8f0;
      border-color: rgba(53, 138, 102, 0.28);
    }

    .tick {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(23, 33, 31, 0.22);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 950;
    }

    .done .tick {
      background: var(--brand);
      border-color: var(--brand);
    }

    .step-title {
      display: block;
      min-width: 0;
      font-size: 0.68rem;
      line-height: 1.05;
      font-weight: 950;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .step-time, .step-age {
      display: block;
      margin-top: 3px;
      font-size: 0.56rem;
      line-height: 1;
      font-weight: 950;
    }

    .step-time { color: var(--muted); }
    .step-age { color: var(--brand); }

    .editor-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 0 8px 8px;
    }

    .edit-tools {
      position: absolute;

  <script>
    const STORAGE_KEY = "perfect-host-v10";
    const UNDO_LIMIT = 50;
    const MAP_VERSION = "blank-map-v2";
    const FLOOR_WIDTH = 1665;
    const FLOOR_HEIGHT = 945;
    const DEFAULT_SETTINGS = {
      drinkWarnMins: 10,
      drinkCriticalMins: 20,
      foodWarnMins: 30,
      foodCriticalMins: 40
    };
    const statuses = {

      seated: { label: "Sat", color: "#8fd7ff" },
      water: { label: "Water done", color: "#8fd7ff" },

    };

    const steps = [
      ["water", "Water"],
      ["drinks", "Drinks ordered"],
      ["drinksArrived", "Drinks arrived"],
      ["food", "Food ordered"],
      ["foodArrived", "Food arrived"],
      ["checkBack", "Check"],

    ];

    const tableSpecs = [
      spec("10", 120, 216, 126, 68, 6, "rectangle", "six"),
      spec("11", 260, 188, 64, 86, 4),
      spec("12", 354, 188, 64, 86, 4),
      spec("13", 448, 188, 64, 86, 4),
      spec("14", 542, 188, 64, 86, 4),
      spec("15", 636, 188, 64, 86, 4),
      spec("16", 730, 188, 64, 86, 4),
      spec("20", 420, 330, 64, 86, 4),
      spec("21", 540, 330, 64, 86, 4),
      spec("23", 730, 330, 64, 86, 4),
      spec("30", 420, 470, 64, 86, 4),
      spec("31", 540, 470, 64, 86, 4),
      spec("32", 660, 472, 58, 64, 2, "square", "two"),
      spec("33", 746, 470, 64, 86, 4),
      spec("40", 118, 610, 154, 68, 6, "rectangle", "six"),
      spec("50", 968, 338, 64, 86, 4),
      spec("51", 968, 198, 64, 86, 4),
      spec("52", 1082, 206, 58, 64, 2, "square", "two"),
      spec("53", 1082, 338, 64, 86, 4),
      spec("54", 1192, 338, 58, 64, 2, "square", "two"),
      spec("55", 1192, 206, 58, 64, 2, "square", "two"),
      spec("56", 1300, 226, 64, 96, 4),
      spec("57", 1300, 350, 58, 64, 2, "square", "two"),
      spec("64", 1516, 468, 72, 72, 2, "round", "round2"),
      spec("70", 1124, 712, 74, 74, 3, "round", "round3"),
      spec("71", 1256, 716, 74, 74, 3, "round", "round3"),
      spec("74", 1516, 604, 76, 76, 3, "high", "round3"),
      spec("75", 1172, 514, 64, 64, 2, "high", "round2"),
      spec("76", 1312, 514, 64, 64, 2, "high", "round2"),
      spec("60", 1362, 218, 62, 142, 0, "sofa", "none"),
      spec("61", 1454, 218, 62, 142, 0, "sofa", "none"),
      spec("62", 1518, 218, 62, 142, 0, "sofa", "none"),
      spec("63", 1590, 218, 62, 142, 0, "sofa", "none"),
      spec("72", 1360, 750, 62, 136, 0, "sofa", "none"),
      spec("73", 1458, 750, 62, 136, 0, "sofa", "none")
    ];

    function spec(id, x, y, w, h, seatCount, tableType = "rectangle", chairMode = "sides") {
      return {
        id,
        name: `Table ${id}`,
        seatCount,
        tableType,
        chairMode,
        sizePreset: seatCount === 6 ? "six" : seatCount === 2 ? "two" : tableType,
        layout: { x, y, w, h, shape: tableType, r: 0 }
      };
    }

    const now = Date.now();
    const minutesAgo = (m) => new Date(now - m * 60000).toISOString();
    let zoom = 1;
    let undoStack = [];

    function blankSteps(overrides = {}) {
      const base = {};
      steps.forEach(([key]) => base[key] = { done: false, time: "", note: "" });
      return { ...base, ...overrides };
    }

    function makeTable(id, name, guests = 0, seatedAt = "", stepOverrides = {}, extras = {}) {
      return {
        id, name, guests, seatedAt,
        seatCount: extras.seatCount ?? 4,
        tableType: extras.tableType ?? "rectangle",
        chairMode: extras.chairMode ?? "sides",
        sizePreset: extras.sizePreset ?? "four",
        attention: false,
        attentionNote: "",
        moment: "",
        leftTime: "",
        drinkRound: 1,
        drinkHistory: [],
        layout: null,
        steps: blankSteps(stepOverrides),
        ...extras
      };
    }

    function demoTable(id, guests = 0, seatedAt = "", stepOverrides = {}, extras = {}) {
      const meta = tableSpecs.find(t => t.id === id);
      return makeTable(id, meta?.name || `Table ${id}`, guests, seatedAt, stepOverrides, {
        seatCount: meta?.seatCount ?? 4,
        tableType: meta?.tableType ?? "rectangle",
        chairMode: meta?.chairMode ?? "sides",
        sizePreset: meta?.sizePreset ?? "four",
        layout: meta ? { ...meta.layout } : null,
        ...extras
      });
    }

    const demoTables = [
      demoTable("10", 2, minutesAgo(18), {
        water: { done: true, time: minutesAgo(16), note: "Still water, lime." },
        drinks: { done: true, time: minutesAgo(12), note: "Two Picpoul." },
        drinksArrived: { done: true, time: minutesAgo(8), note: "" }
      }),
      demoTable("11", 4, minutesAgo(42), {
        water: { done: true, time: minutesAgo(39), note: "" },
        drinks: { done: true, time: minutesAgo(36), note: "One AF beer." },
        drinksArrived: { done: true, time: minutesAgo(31), note: "" },
        food: { done: true, time: minutesAgo(32), note: "" }
      }),
      demoTable("12", 0, "", {}),
      demoTable("13", 4, minutesAgo(13), {}, { attention: true, attentionNote: "High chair." }),
      demoTable("50", 3, minutesAgo(67), {
        water: { done: true, time: minutesAgo(65), note: "" },
        drinks: { done: true, time: minutesAgo(62), note: "" },
        drinksArrived: { done: true, time: minutesAgo(58), note: "" },
        food: { done: true, time: minutesAgo(54), note: "Dairy allergy." },
        foodArrived: { done: true, time: minutesAgo(30), note: "" },
        checkBack: { done: true, time: minutesAgo(24), note: "Happy." },
        clearDessert: { done: true, time: minutesAgo(8), note: "Birthday brownie." }
      }, { moment: "Birthday: Sophie. Picpoul." }),
      demoTable("55", 2, minutesAgo(35), {
        water: { done: true, time: minutesAgo(33), note: "" },
        drinks: { done: true, time: minutesAgo(30), note: "" },
        drinksArrived: { done: true, time: minutesAgo(27), note: "" },
        food: { done: true, time: minutesAgo(31), note: "Chase kitchen." }
      }),
      demoTable("70", 2, minutesAgo(92), {
        water: { done: true, time: minutesAgo(90), note: "" },
        drinks: { done: true, time: minutesAgo(86), note: "" },
        drinksArrived: { done: true, time: minutesAgo(82), note: "" },
        food: { done: true, time: minutesAgo(76), note: "" },
        foodArrived: { done: true, time: minutesAgo(48), note: "" },
        checkBack: { done: true, time: minutesAgo(42), note: "" },
        clearDessert: { done: true, time: minutesAgo(16), note: "" },
        moreDrinksBill: { done: true, time: minutesAgo(3), note: "Bill requested." }
      }),
      demoTable("72", 0, "", {}, { leftTime: minutesAgo(6) }),
      ...tableSpecs
        .filter(meta => !["10", "11", "12", "13", "50", "55", "70", "72"].includes(meta.id))
        .map(meta => demoTable(meta.id))
    ];

    let state = load();
    let editMode = false;
    let editToolsCollapsed = false;
    let dragging = null;
    const floor = document.getElementById("floor");
    const editor = document.getElementById("editor");
    const mapViewport = document.getElementById("mapViewport");
    const mapScale = document.getElementById("mapScale");
    const noteForm = document.getElementById("noteForm");
    const noteText = document.getElementById("noteText");
    const settingsForm = document.getElementById("settingsForm");
    const drinkWarnInput = document.getElementById("drinkWarnInput");
    const drinkCriticalInput = document.getElementById("drinkCriticalInput");
    const foodWarnInput = document.getElementById("foodWarnInput");
    const foodCriticalInput = document.getElementById("foodCriticalInput");
    const installPrompt = document.getElementById("installPrompt");

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (saved?.tables?.length) return normalizeState(saved);
      } catch {}
      return normalizeState({ selectedId: "", tables: demoTables, fixtures: defaultFixtures(), mapVersion: MAP_VERSION });
    }

    function defaultFixtures() {
      return [
        { id: "sea", type: "sea", x: 0, y: 0, w: 1500, h: 82, r: 0 },
        { id: "deck", type: "deck", x: -10, y: 82, w: 1520, h: 66, r: 0 },
        { id: "window", type: "window", x: 0, y: 148, w: 1500, h: 28, r: 0 },
        { id: "entry", type: "storage", x: 660, y: 118, w: 130, h: 325, r: 0, label: "ENTRANCE" },
        { id: "stairs-up", type: "storage", x: 660, y: 118, w: 130, h: 140, r: 0, label: "STAIRS UP" },
        { id: "host", type: "pass", x: 740, y: 388, w: 76, h: 90, r: -14, label: "HOST" },
        { id: "fire", type: "door", x: 18, y: 430, w: 58, h: 92, r: 0, label: "FIRE EXIT" },
        { id: "kitchen-pass", type: "pass", x: 52, y: 716, w: 54, h: 142, r: 0, label: "KITCHEN PASS" },
        { id: "barback", type: "storage", x: 128, y: 690, w: 176, h: 170, r: 0, label: "BARBACK" },
        { id: "bar", type: "bar", x: 455, y: 760, w: 565, h: 86, r: 0 },
        { id: "stairs-down", type: "storage", x: 1268, y: 746, w: 92, h: 112, r: 0, label: "STAIRS DOWN" },
        { id: "stairs-up-br", type: "storage", x: 1365, y: 746, w: 92, h: 112, r: 0, label: "STAIRS UP" }
      ];
    }

    function normalizeState(value) {
      value.fixtures ||= defaultFixtures();
      value.settings = normalizeSettings(value.settings);
      const needsLayoutMigration = value.mapVersion !== MAP_VERSION;
      value.tables.forEach((table, index) => {
        const meta = tableSpecs.find(t => t.id === table.id);
        table.steps = blankSteps(table.steps || {});
        table.drinkRound ||= 1;
        table.drinkHistory ||= [];
        table.seatCount ??= meta?.seatCount ?? table.seatCount ?? 4;
        table.tableType ??= meta?.tableType ?? "rectangle";
        table.chairMode ??= meta?.chairMode ?? "sides";
        table.sizePreset ??= meta?.sizePreset ?? "four";
        if (needsLayoutMigration && meta) {
          table.layout = { ...meta.layout };
          table.seatCount = meta.seatCount;
          table.tableType = meta.tableType;
          table.chairMode = meta.chairMode;
          table.sizePreset = meta.sizePreset;
        }
        table.layout ||= meta ? { ...meta.layout } : { ...tableSpecs[index % tableSpecs.length].layout };
      });
      tableSpecs.forEach((meta) => {
        if (!value.tables.some(table => table.id === meta.id)) value.tables.push(demoTable(meta.id));
      });
      value.mapVersion = MAP_VERSION;
      return value;
    }

    function normalizeSettings(settings = {}) {
      const out = { ...DEFAULT_SETTINGS, ...settings };
      out.drinkWarnMins = Math.max(1, Number(out.drinkWarnMins) || DEFAULT_SETTINGS.drinkWarnMins);
      out.drinkCriticalMins = Math.max(out.drinkWarnMins, Number(out.drinkCriticalMins) || DEFAULT_SETTINGS.drinkCriticalMins);
      out.foodWarnMins = Math.max(1, Number(out.foodWarnMins) || DEFAULT_SETTINGS.foodWarnMins);
      out.foodCriticalMins = Math.max(out.foodWarnMins, Number(out.foodCriticalMins) || DEFAULT_SETTINGS.foodCriticalMins);
      return out;
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      document.getElementById("undoBtn").disabled = undoStack.length === 0;
    }

    function mutate(fn) {
      undoStack.push(JSON.stringify(state));
      if (undoStack.length > UNDO_LIMIT) undoStack.shift();
      fn();
      save();
      render();
    }

    function selected() {
      return state.tables.find(t => t.id === state.selectedId);
    }

    function minsSince(value) {
      if (!value) return 0;
      return Math.max(0, Math.floor((Date.now() - new Date(value).getTime()) / 60000));
    }

    function minsBetween(start, end = new Date().toISOString()) {
      if (!start || !end) return 0;
      return Math.max(0, Math.floor((new Date(end).getTime() - new Date(start).getTime()) / 60000));
    }

    function elapsed(value) {
      if (!value) return "-";
      const mins = minsSince(value);
      if (mins < 60) return `${mins}m`;
      return `${Math.floor(mins / 60)}h ${mins % 60}m`;
    }

    function precise(value) {
      if (!value) return "";
      return preciseBetween(value);
    }

    function preciseBetween(start, end = new Date().toISOString()) {
      if (!start || !end) return "";
      const total = Math.max(0, Math.floor((new Date(end).getTime() - new Date(start).getTime()) / 1000));
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      return h ? `${h}h ${m}m ${s}s` : `${m}m ${s}s`;
    }

    function time(value) {
      if (!value) return "-";
      return new Intl.DateTimeFormat("en-GB", { hour: "2-digit", minute: "2-digit" }).format(new Date(value));
    }

    function dateValue(value) {
      if (!value) return "";
      const d = new Date(value);
      return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    }

    function fromDate(value) {
      return value ? new Date(value).toISOString() : "";
    }

    function alerts(table) {
      if (!table.guests || table.leftTime) return [];
      const out = [];
      if (table.attention) out.push("!");
      const drinksWait = table.steps.drinks.done && !table.steps.drinksArrived.done ? minsBetween(table.steps.drinks.time) : 0;
      if (drinksWait >= state.settings.drinkCriticalMins) out.push(`Drinks ${state.settings.drinkCriticalMins}m`);
      else if (drinksWait >= state.settings.drinkWarnMins) out.push(`Drinks ${state.settings.drinkWarnMins}m`);
      const foodWait = table.steps.food.done && !table.steps.foodArrived.done ? minsSince(table.steps.food.time) : 0;
      if (foodWait >= state.settings.foodCriticalMins) out.push(`Food ${state.settings.foodCriticalMins}m`);
      else if (foodWait >= state.settings.foodWarnMins) out.push(`Food ${state.settings.foodWarnMins}m`);
      return out;
    }

    function statusKey(table) {
      if (table.attention) return "attention";
      if (table.leftTime) return "left";
      if (!table.guests) return "empty";
      if (table.steps.billPaid.done) return "paid";
      if (table.steps.moreDrinksBill.done) return "bill";
      if (table.steps.checkBack.done || table.steps.clearDessert.done) return "foodArrived";
      if (table.steps.foodArrived.done) return "foodArrived";
      if (table.steps.food.done) return "food";
      if (table.steps.drinksArrived.done) return "drinksArrived";
      if (table.steps.drinks.done) return "drinks";
      if (table.drinkHistory?.length) return "drinksArrived";
      if (table.steps.water.done) return "water";
      return "seated";
    }

    function shortName(name) {
      const n = name.match(/\d+/)?.[0];
      return n ? `T${n}` : name.split(" ").map(p => p[0]).join("").slice(0, 3).toUpperCase();
    }

    function firstNote(table) {
      if (table.attentionNote) return table.attentionNote;
      if (table.moment) return table.moment;
      for (const [key] of steps) if (table.steps[key]?.note) return table.steps[key].note;
      return "";
    }

    function ordinal(value) {
      const n = Number(value) || 1;
      const mod100 = n % 100;
      if (mod100 >= 11 && mod100 <= 13) return `${n}th`;
      if (n % 10 === 1) return `${n}st`;
      if (n % 10 === 2) return `${n}nd`;
      if (n % 10 === 3) return `${n}rd`;
      return `${n}th`;
    }

    function stepLabel(table, key, label) {
      if (key === "drinks") return `${ordinal(table.drinkRound)} Drinks`;
      if (key === "drinksArrived") return "Drinks arrived";
      return label;
    }

    function ensureSeated(table) {
      if (table.guests > 0) return;
      table.guests = tableDefaultGuests(table);
      table.seatedAt = table.seatedAt || new Date().toISOString();
    }

    function completeDrinkRound(table, arrivedTime) {
      const round = table.drinkRound || 1;
      table.drinkHistory ||= [];
      table.drinkHistory.push({
        round,
        orderedTime: table.steps.drinks.time || arrivedTime,
        arrivedTime,
        orderNote: table.steps.drinks.note || "",
        arrivalNote: table.steps.drinksArrived.note || ""
      });
      table.drinkRound = round + 1;
      table.steps.drinks = { done: false, time: "", note: "" };
      table.steps.drinksArrived = { done: false, time: "", note: "" };
    }

    function tableDefaultGuests(table) {
      return Math.max(1, Math.min(6, table.seatCount || 1));
    }

    function tableClass(table, layout) {
      const type = table.tableType === "sofa" ? "sofa-table" : table.tableType || layout.shape || "rectangle";
      return [type, table.sizePreset, layout.shape].filter(Boolean).join(" ");
    }

    function renderChairs(table) {
      if (table.tableType === "sofa" || table.chairMode === "none" || !table.seatCount) return "";
      const sideChair = (side, y) => `<i class="chair side-${side}" style="--cy:${y}%"></i>`;
      const longChair = (side, x) => `<i class="chair long-${side}" style="--cx:${x}%"></i>`;
      const radialChair = angle => `<i class="chair radial" style="--a:${angle}deg"></i>`;
      if (table.chairMode === "six" || table.seatCount >= 6) {
        return [22, 50, 78].map(x => `${longChair("top", x)}${longChair("bottom", x)}`).join("");
      }
      if (table.chairMode?.startsWith("round") || ["round", "high"].includes(table.tableType)) {
        const count = Math.max(2, Math.min(4, table.seatCount || 2));
        return Array.from({ length: count }, (_, index) => radialChair(index * (360 / count))).join("");
      }
      const rows = table.seatCount <= 2 ? [50] : [34, 66];
      return rows.map(y => `${sideChair("left", y)}${sideChair("right", y)}`).join("");
    }

    function renderFloor() {
      const fixtures = "";
      const tables = state.tables.map((table, index) => {
        const layout = table.layout || getSpecLayout(table, index);
        const s = statuses[statusKey(table)];
        const tableAlerts = alerts(table);
        const visualColor = tableAlerts.length ? statuses.attention.color : s.color;
        const chairMarkup = renderChairs(table);
        return `
          <button class="table ${tableClass(table, layout)} ${table.id === state.selectedId ? "selected" : ""} ${tableAlerts.length ? "alert" : ""}"
            data-id="${table.id}" type="button"
            style="--x:${layout.x}px;--y:${layout.y}px;--w:${layout.w}px;--h:${layout.h}px;--status:${visualColor};transform:rotate(${layout.r || 0}deg)"
            aria-label="${table.name}">
            <span class="piece">
              ${chairMarkup}
              <span class="shape"></span>
              <span class="badge">${shortName(table.name)}<small>${table.guests ? `${table.guests}p · ${elapsed(table.seatedAt)}` : "Empty"}</small></span>
              <span class="flag">${tableAlerts[0] || s.label}</span>
            </span>
          </button>
        `;
      }).join("");

      floor.innerHTML = `
        ${fixtures}
        ${tables}
      `;
    }

    function renderFixture(item) {
      const style = `left:${item.x}px;top:${item.y}px;width:${item.w}px;height:${item.h}px;transform:rotate(${item.r || 0}deg)`;
      const label = item.label || "";
      if (item.type === "sea") return `<div class="sea fixture" data-fixture="${item.id}" style="${style}"></div>`;
      if (item.type === "prep") return `<div class="room prep fixture" data-fixture="${item.id}" style="${style}">${label}</div>`;
      if (item.type === "storage") return `<div class="room storage fixture" data-fixture="${item.id}" style="${style}">${label}</div>`;
      if (item.type === "bar") return `<div class="bar fixture" data-fixture="${item.id}" style="${style}"></div>`;
      if (item.type === "pass") return `<div class="room pass fixture" data-fixture="${item.id}" style="${style}">${label || "PASS"}</div>`;
      if (item.type === "sofa") return `<div class="sofa fixture" data-fixture="${item.id}" style="${style}"><i style="--seat:#cbd4bd"></i><i style="--seat:#a8bbb6"></i><i style="--seat:#089199"></i><i style="--seat:#c7ceb8"></i><i style="--seat:#afbfbc"></i><i style="--seat:#089199"></i></div>`;
      if (item.type === "window") return `<div class="window fixture" data-fixture="${item.id}" style="${style}"></div>`;
      if (item.type === "deck") return `<div class="deck fixture" data-fixture="${item.id}" style="${style}"></div>`;
      if (item.type === "door") return `<div class="room fixture door" data-fixture="${item.id}" style="${style}">${label}</div>`;
      if (item.type === "wall") return `<div class="room fixture wall" data-fixture="${item.id}" style="${style}"></div>`;
      return "";
    }

    function renderEditor() {
      const table = selected();
      if (!table || editMode) {
        editor.classList.remove("open");
        return;
      }
      const s = statuses[statusKey(table)];
      editor.classList.add("open");
      editor.innerHTML = `
        <div class="editor-head">
          <h2>${table.name}</h2>
          <span class="pill" style="--status:${s.color}">${s.label}</span>
          <button class="close" id="closeEditor" type="button">×</button>
        </div>
        <div class="quick">
          <div class="guest-stepper">
            <button data-guests="-1" type="button">−</button>
            <div class="guest-count">${table.guests || 0}</div>
            <button data-guests="1" type="button">+</button>
          </div>
          <div class="elapsed">Sat ${time(table.seatedAt)}<br>${precise(table.seatedAt) || "-"}</div>
        </div>
        <div class="steps">
          ${steps.map(([key, label]) => renderStep(table, key, stepLabel(table, key, label))).join("")}
        </div>
        <div class="editor-actions">
          <button class="btn" data-left type="button">${table.leftTime ? "Reopen" : "Left"}</button>
          <button class="btn ${table.attention ? "danger" : ""}" data-attention type="button">Attention!</button>
          <button class="btn" data-note type="button">Note</button>
          <button class="btn danger" data-reset type="button">Reset</button>
        </div>
      `;
    }

    function renderStep(table, key, label) {
      const step = table.steps[key];
      return `
        <button class="step ${step.done ? "done" : ""}" data-step="${key}" type="button">
          <span class="tick">${step.done ? "✓" : ""}</span>
          <span>
            <span class="step-title">${label}</span>
            <span class="step-time">${step.done ? time(step.time) : "Not set"}</span>
            <span class="step-age">${step.done ? stepDuration(table, key) : ""}</span>
          </span>
        </button>
      `;
    }

    function stepDuration(table, key) {
      if (key === "drinks" && table.steps.drinksArrived.done) return preciseBetween(table.steps.drinks.time, table.steps.drinksArrived.time);
      if (key === "food" && table.steps.foodArrived.done) return preciseBetween(table.steps.food.time, table.steps.foodArrived.time);
      return precise(table.steps[key].time);
    }

    function render() {
      renderFloor();
      renderEditor();
      applyZoom();
      document.getElementById("undoBtn").disabled = undoStack.length === 0;
      document.body.classList.toggle("edit-mode", editMode);
      document.getElementById("editBtn").classList.toggle("active", editMode);
      document.getElementById("editTools").classList.toggle("collapsed", editToolsCollapsed);
      document.getElementById("editToolsToggle").textContent = editToolsCollapsed ? "Tools" : "Min";
    }

    function applyZoom() {
      mapScale.style.setProperty("--floor-w", `${FLOOR_WIDTH}px`);
      mapScale.style.setProperty("--floor-h", `${FLOOR_HEIGHT}px`);
      mapScale.style.setProperty("--zoom", zoom);
      floor.style.setProperty("--zoom", zoom);
      const rect = mapViewport.getBoundingClientRect();
      const spareX = rect.width - FLOOR_WIDTH * zoom;
      const spareY = rect.height - FLOOR_HEIGHT * zoom;
      mapScale.style.setProperty("--map-x", `${spareX >= 0 ? spareX / 2 : spareX / 2}px`);
      mapScale.style.setProperty("--map-y", `${spareY >= 0 ? Math.min(8, spareY / 2) : spareY * 0.68}px`);
    }

    function fitZoom() {
      const rect = mapViewport.getBoundingClientRect();
      const widthFit = rect.width / FLOOR_WIDTH;
      const heightFit = rect.height / FLOOR_HEIGHT;
      zoom = Math.max(0.32, Math.min(1.35, Math.max(widthFit, heightFit)));
      applyZoom();
      mapViewport.scrollLeft = 0;
      mapViewport.scrollTop = 0;
    }

    floor.addEventListener("pointerdown", (event) => {
      if (!editMode) return;
      const button = event.target.closest(".table");
      const fixtureEl = event.target.closest(".fixture");
      if (!button && !fixtureEl) return;
      const targetType = button ? "table" : "fixture";
      const record = button
        ? state.tables.find(t => t.id === button.dataset.id)
        : state.fixtures.find(f => f.id === fixtureEl.dataset.fixture);
      if (!record) return;
      const layout = button ? getLayout(record) : record;
      if (button) state.selectedId = record.id;
      dragging = {
        id: record.id,
        type: targetType,
        snapshot: JSON.stringify(state),
        startX: event.clientX,
        startY: event.clientY,
        x: layout.x,
        y: layout.y,
        moved: false
      };
      (button || fixtureEl).setPointerCapture?.(event.pointerId);
      event.preventDefault();
      render();
    });

    floor.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      const record = dragging.type === "table"
        ? state.tables.find(t => t.id === dragging.id)
        : state.fixtures.find(f => f.id === dragging.id);
      if (!record) return;
      const layout = dragging.type === "table" ? getLayout(record) : record;
      const dx = (event.clientX - dragging.startX) / zoom;
      const dy = (event.clientY - dragging.startY) / zoom;
      if (Math.abs(dx) + Math.abs(dy) > 2) dragging.moved = true;
      layout.x = Math.max(0, Math.min(FLOOR_WIDTH - layout.w, Math.round(dragging.x + dx)));
      layout.y = Math.max(0, Math.min(FLOOR_HEIGHT - layout.h, Math.round(dragging.y + dy)));
      if (dragging.type === "table") record.layout = layout;
      renderFloor();
      applyZoom();
    });

    floor.addEventListener("pointerup", () => {
      if (!dragging) return;
      if (dragging.moved) {
        undoStack.push(dragging.snapshot);
        if (undoStack.length > UNDO_LIMIT) undoStack.shift();
        save();
      }
      dragging = null;
    });

    function getLayout(table) {
      if (!table.layout) {
        const index = state.tables.findIndex(t => t.id === table.id);
        table.layout = getSpecLayout(table, index);
      }
      return table.layout;
    }

    function getSpecLayout(table, index = 0) {
      const meta = tableSpecs.find(t => t.id === table.id);
      if (meta) return { ...meta.layout };
      const col = index % 8;
      const row = Math.floor(index / 8) % 4;
      return { x: 420 + col * 86, y: 250 + row * 92, w: 58, h: 78, shape: table.tableType || "rectangle", r: 0 };
    }

    function defaultNewTableLayout() {
      return { x: 420, y: 520, w: 58, h: 78, shape: "rectangle", r: 0 };
    }

    function chairModeFor(tableType, seatCount) {
      if (tableType === "sofa") return "none";
      if (["round", "high"].includes(tableType)) return `round${Math.max(2, Math.min(4, seatCount || 2))}`;
      if ((seatCount || 0) >= 6) return "six";
      if ((seatCount || 0) <= 2) return "two";
      return "sides";
    }

    function applyTableKind(table, tableType = table.tableType, seatCount = table.seatCount) {
      table.tableType = tableType;
      table.seatCount = Math.max(0, Math.min(8, Number(seatCount) || 0));
      table.chairMode = chairModeFor(table.tableType, table.seatCount);
      table.sizePreset = table.seatCount === 6 ? "six" : table.seatCount === 2 ? "two" : table.tableType;
      const layout = getLayout(table);
      layout.shape = table.tableType;
      if (table.tableType === "round" || table.tableType === "high") {
        const size = table.tableType === "high" ? 70 : 64;
        layout.w = size;
        layout.h = size;
      } else if (table.tableType === "sofa") {
        layout.w = Math.max(layout.w, 46);
        layout.h = Math.max(layout.h, 122);
      } else if (table.tableType === "square") {
        layout.w = 52;
        layout.h = table.seatCount <= 2 ? 58 : 52;
      } else if (table.seatCount >= 6) {
        layout.w = Math.max(layout.w, 122);
        layout.h = Math.min(Math.max(layout.h, 58), 78);
      } else if (table.seatCount <= 2) {
        layout.w = 52;
        layout.h = 58;
      } else {
        layout.w = 58;
        layout.h = 78;
      }
      table.layout = layout;
    }

    floor.addEventListener("click", (event) => {
      const button = event.target.closest(".table");
      if (!button) return;
      state.selectedId = button.dataset.id;
      save();
      render();
    });

    editor.addEventListener("click", (event) => {
      const table = selected();
      if (!table) return;
      const stepButton = event.target.closest("[data-step]");
      if (stepButton) {
        mutate(() => {
          const step = table.steps[stepButton.dataset.step];
          step.done = !step.done;
          step.time = step.done ? (step.time || new Date().toISOString()) : "";
          if (step.done) ensureSeated(table);
          if (stepButton.dataset.step === "drinksArrived" && step.done && !table.steps.drinks.done) {
            table.steps.drinks.done = true;
            table.steps.drinks.time = table.steps.drinks.time || step.time;
          }
          if (stepButton.dataset.step === "drinksArrived" && step.done) {
            completeDrinkRound(table, step.time);
            return;
          }
          if (stepButton.dataset.step === "foodArrived" && step.done && !table.steps.food.done) {
            table.steps.food.done = true;
            table.steps.food.time = table.steps.food.time || step.time;
          }
        });
      }
      if (event.target.id === "closeEditor") {
        state.selectedId = "";
        save();
        render();
      }
      if (event.target.matches("[data-attention]")) mutate(() => {
        table.attention = !table.attention;
        if (table.attention) ensureSeated(table);
      });
      if (event.target.matches("[data-left]")) mutate(() => table.leftTime = table.leftTime ? "" : new Date().toISOString());
      if (event.target.matches("[data-guests]")) {
        const delta = Number(event.target.dataset.guests);
        mutate(() => {
          if ((table.guests || 0) === 0 && delta > 0) {
            table.guests = tableDefaultGuests(table);
          } else {
            table.guests = Math.max(0, Math.min(30, (table.guests || 0) + delta));
          }
          if (table.guests > 0 && !table.seatedAt) table.seatedAt = new Date().toISOString();
          if (table.guests === 0) table.seatedAt = "";
        });
      }
      if (event.target.matches("[data-note]")) {
        noteText.value = table.moment || table.attentionNote || firstNote(table);
        noteForm.hidden = false;
        noteForm.classList.add("open");
        noteText.focus();
      }
      if (event.target.matches("[data-reset]") && confirm(`Reset ${table.name}?`)) {
        mutate(() => {
          const { layout, seatCount, tableType, chairMode, sizePreset } = table;
          const index = state.tables.findIndex(t => t.id === table.id);
          state.tables[index] = makeTable(table.id, table.name, 0, "", {}, { layout, seatCount, tableType, chairMode, sizePreset });
        });
      }
    });

    function saveCurrentNote() {
      const table = selected();
      if (!table) return;
      noteForm.classList.remove("open");
      noteForm.hidden = true;
      mutate(() => table.moment = noteText.value.trim());
    }

    noteForm.addEventListener("submit", (event) => {
      event.preventDefault();
      saveCurrentNote();
    });

    document.getElementById("noteSave").addEventListener("click", saveCurrentNote);

    function syncSettingsForm() {
      const settings = normalizeSettings(state.settings);
      drinkWarnInput.value = settings.drinkWarnMins;
      drinkCriticalInput.value = settings.drinkCriticalMins;
      foodWarnInput.value = settings.foodWarnMins;
      foodCriticalInput.value = settings.foodCriticalMins;
    }

    function closeSettings() {
      settingsForm.classList.remove("open");
      settingsForm.hidden = true;
    }

    document.getElementById("settingsBtn").addEventListener("click", () => {
      syncSettingsForm();
      settingsForm.hidden = false;
      settingsForm.classList.add("open");
    });

    document.getElementById("settingsClose").addEventListener("click", closeSettings);

    document.getElementById("settingsReset").addEventListener("click", () => {
      drinkWarnInput.value = DEFAULT_SETTINGS.drinkWarnMins;
      drinkCriticalInput.value = DEFAULT_SETTINGS.drinkCriticalMins;
      foodWarnInput.value = DEFAULT_SETTINGS.foodWarnMins;
      foodCriticalInput.value = DEFAULT_SETTINGS.foodCriticalMins;
    });

    settingsForm.addEventListener("submit", (event) => {
      event.preventDefault();
      mutate(() => {
        state.settings = normalizeSettings({
          drinkWarnMins: drinkWarnInput.value,
          drinkCriticalMins: drinkCriticalInput.value,
          foodWarnMins: foodWarnInput.value,
          foodCriticalMins: foodCriticalInput.value
        });
      });
      closeSettings();
    });

    document.getElementById("undoBtn").addEventListener("click", () => {
      const previous = undoStack.pop();
      if (!previous) return;
      state = JSON.parse(previous);
      save();
      render();
    });

    document.getElementById("demoBtn").addEventListener("click", () => {
      if (!confirm("Reset demo data?")) return;
      mutate(() => state = normalizeState({ selectedId: "", tables: demoTables, fixtures: defaultFixtures(), mapVersion: MAP_VERSION }));
      setTimeout(fitZoom, 0);
    });

    document.getElementById("addBtn").addEventListener("click", () => {
      const name = prompt("Table name", `Table ${state.tables.length + 1}`);
      if (!name?.trim()) return;
      mutate(() => {
        const id = String(Date.now());
        const layout = defaultNewTableLayout();
        state.tables.push(makeTable(id, name.trim(), 0, "", {}, {
          layout,
          seatCount: 4,
          tableType: "rectangle",
          chairMode: "sides",
          sizePreset: "rectangle"
        }));
        state.selectedId = id;
      });
    });

    document.getElementById("editBtn").addEventListener("click", () => {
      editMode = !editMode;
      if (!editMode) editToolsCollapsed = false;
      render();
    });

    document.getElementById("editToolsToggle").addEventListener("click", () => {
      editToolsCollapsed = !editToolsCollapsed;
      render();
    });

    document.getElementById("doneEditBtn").addEventListener("click", () => {
      editMode = false;
      editToolsCollapsed = false;
      save();
      render();
    });

    document.getElementById("savePlanBtn").addEventListener("click", () => {
      save();
      document.getElementById("savePlanBtn").textContent = "Saved";
      setTimeout(() => { document.getElementById("savePlanBtn").textContent = "Save"; }, 900);
    });

    document.querySelectorAll("[data-add-fixture]").forEach((button) => {
      button.addEventListener("click", () => {
        const type = button.dataset.addFixture;
        mutate(() => {
          const id = `${type}-${Date.now()}`;
          const defaults = {
            wall: { w: 180, h: 18 },
            door: { w: 90, h: 18 },
            bar: { w: 180, h: 56 },
            pass: { w: 120, h: 28 }
          }[type];
          state.fixtures.push({ id, type, x: 420, y: 260, r: 0, ...defaults });
        });
      });
    });

    document.getElementById("typeBtn").addEventListener("click", () => {
      const table = selected();
      if (!table) return;
      const types = ["rectangle", "square", "round", "high", "sofa"];
      mutate(() => {
        const next = types[(types.indexOf(table.tableType) + 1) % types.length];
        const seats = next === "sofa" ? 0 : table.seatCount || (next === "round" ? 2 : 4);
        applyTableKind(table, next, seats);
      });
    });

    document.getElementById("seatsBtn").addEventListener("click", () => {
      const table = selected();
      if (!table) return;
      const value = prompt("Seat count", String(table.seatCount || 0));
      if (value === null) return;
      mutate(() => applyTableKind(table, table.tableType, Number(value)));
    });

    document.getElementById("splitBtn").addEventListener("click", () => {
      const table = selected();
      if (!table) return;
      mutate(() => {
        const layout = getLayout(table);
        const wasJoined = layout.w > 90;
        table.tableType = "rectangle";
        table.seatCount = 4;
        table.chairMode = "sides";
        table.sizePreset = "rectangle";
        layout.shape = "rectangle";
        layout.w = 58;
        layout.h = 78;
        table.layout = layout;
        if (wasJoined) {
          const id = String(Date.now());
          const nextLayout = { ...layout, x: Math.min(FLOOR_WIDTH - layout.w, layout.x + 84), y: layout.y };
          state.tables.push(makeTable(id, `${table.name}B`, 0, "", {}, {
            layout: nextLayout,
            seatCount: 4,
            tableType: "rectangle",
            chairMode: "sides",
            sizePreset: "rectangle"
          }));
          state.selectedId = id;
        }
      });
    });

    document.getElementById("joinBtn").addEventListener("click", () => {
      const table = selected();
      if (!table) return;
      mutate(() => {
        const layout = getLayout(table);
        table.tableType = "rectangle";
        table.seatCount = 6;
        table.chairMode = "six";
        table.sizePreset = "six";
        layout.shape = "rectangle joined";
        layout.w = 142;
        layout.h = 62;
        table.layout = layout;
      });
    });

    document.getElementById("rotateBtn").addEventListener("click", () => {
      const table = selected();
      if (!table) return;
      mutate(() => {
        const layout = getLayout(table);
        [layout.w, layout.h] = [layout.h, layout.w];
        layout.r = ((layout.r || 0) + 90) % 180;
        table.layout = layout;
      });
    });

    document.getElementById("zoomIn").addEventListener("click", () => { zoom = Math.min(1.5, +(zoom + 0.1).toFixed(2)); applyZoom(); });
    document.getElementById("zoomOut").addEventListener("click", () => { zoom = Math.max(0.32, +(zoom - 0.1).toFixed(2)); applyZoom(); });
    document.getElementById("fitMap").addEventListener("click", fitZoom);
    window.addEventListener("resize", () => setTimeout(fitZoom, 80));

    function isStandalone() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    function isIosSafari() {
      const ua = navigator.userAgent;
      return /iPad|iPhone|iPod/.test(ua) && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
    }

    function maybeShowInstallPrompt() {
      if (!isIosSafari() || isStandalone() || localStorage.getItem("perfect-host-install-dismissed") === "1") return;
      installPrompt.classList.add("show");
    }

    async function lockLandscape() {
      try {
        if (screen.orientation?.lock) await screen.orientation.lock("landscape");
      } catch {}
    }

    document.getElementById("dismissInstall").addEventListener("click", () => {
      localStorage.setItem("perfect-host-install-dismissed", "1");
      installPrompt.classList.remove("show");
    });

    save();
    lockLandscape();
    render();
    setTimeout(fitZoom, 60);
    setTimeout(maybeShowInstallPrompt, 300);
    function tickTimers() {
      const table = selected();
      if (table && !editMode && editor.classList.contains("open")) {
        const elapsedNode = editor.querySelector(".elapsed");
        if (elapsedNode) elapsedNode.innerHTML = `Sat ${time(table.seatedAt)}<br>${precise(table.seatedAt) || "-"}`;
        editor.querySelectorAll("[data-step]").forEach((node) => {
          const key = node.dataset.step;
          const age = node.querySelector(".step-age");
          if (age && table.steps[key]?.done) age.textContent = stepDuration(table, key);
        });
      }
      floor.querySelectorAll(".table").forEach((node) => {
        const table = state.tables.find(t => t.id === node.dataset.id);
        const small = node.querySelector(".badge small");
        if (table && small) small.textContent = table.guests ? `${table.guests}p - ${elapsed(table.seatedAt)}` : "Empty";
      });
    }

    setInterval(tickTimers, 1000);
  </script>
</body>
</html>
